<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Weather">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Dashboard de previsão do tempo em tempo real">
    <title>Weather Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>☁️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23667eea' width='180' height='180'/><text x='50%' y='50%' font-size='90' dy='.3em' text-anchor='middle' dominant-baseline='middle'>☁️</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather</h1>
            <p>Previsão do tempo</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Cidade ou coordenadas"
                    class="search-input"
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
                <button id="locationBtn" class="location-btn" title="Localização atual">
                    <i class="fas fa-map-marker-alt"></i>
                </button>
            </div>
            <div id="suggestions" class="suggestions hidden"></div>
        </section>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message hidden"></div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Carregando...</p>
        </div>

        <!-- Current Weather -->
        <section class="current-weather hidden" id="currentWeatherSection">
            <div class="weather-header">
                <div class="location-info">
                    <h2 id="cityName">Cidade</h2>
                    <p id="updateTime" class="update-time"></p>
                </div>
                <div class="weather-main">
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="Weather Icon">
                    </div>
                    <div class="weather-temp">
                        <span id="temperature" class="temp">--°</span>
                        <p id="weatherDescription" class="description">--</p>
                    </div>
                </div>
            </div>

            <div class="weather-details-grid">
                <div class="weather-detail">
                    <i class="fas fa-droplet"></i>
                    <div>
                        <p class="label">Umidade</p>
                        <p id="humidity" class="value">--%</p>
                    </div>
                </div>
                <div class="weather-detail">
                    <i class="fas fa-wind"></i>
                    <div>
                        <p class="label">Vento</p>
                        <p id="windSpeed" class="value">--</p>
                    </div>
                </div>
                <div class="weather-detail">
                    <i class="fas fa-gauge-high"></i>
                    <div>
                        <p class="label">Pressão</p>
                        <p id="pressure" class="value">--</p>
                    </div>
                </div>
                <div class="weather-detail">
                    <i class="fas fa-eye"></i>
                    <div>
                        <p class="label">Visibilidade</p>
                        <p id="visibility" class="value">--</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast -->
        <section class="forecast-section hidden" id="forecastSection">
            <h3><i class="fas fa-calendar"></i> Próximos Dias</h3>
            <div class="forecast-grid" id="forecastGrid"></div>
        </section>

        <!-- Hourly Forecast -->
        <section class="hourly-section hidden" id="hourlySection">
            <h3><i class="fas fa-clock"></i> Próximas Horas</h3>
            <div class="hourly-grid" id="hourlyGrid"></div>
        </section>

        <!-- Settings -->
        <section class="settings-section">
            <button id="settingsBtn" class="settings-btn">
                <i class="fas fa-cog"></i> Configurações
            </button>
        </section>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurações</h2>
                <button class="close-btn" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="apiKeyInput">Chave OpenWeatherMap:</label>
                    <input type="password" id="apiKeyInput" class="setting-input" placeholder="Cole sua chave de API">
                    <small>Obtenha em <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a></small>
                </div>
                <div class="setting-group">
                    <label for="tempUnitSelect">Temperatura:</label>
                    <select id="tempUnitSelect" class="setting-input">
                        <option value="metric">Celsius (°C)</option>
                        <option value="imperial">Fahrenheit (°F)</option>
                        <option value="kelvin">Kelvin (K)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="themeSelect">Tema:</label>
                    <select id="themeSelect" class="setting-input">
                        <option value="light">Claro</option>
                        <option value="dark">Escuro</option>
                        <option value="auto">Automático</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettingsBtn" class="btn-primary">Salvar</button>
                <button id="resetSettingsBtn" class="btn-secondary">Restaurar</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
    <script>
        // Registrar Service Worker para funcionar offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
